<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#191a1a" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Altius Fleet</title>
    <style>
      /* Design tokens (Perplexity-inspired dark neutral + teal "super" accent). */
      :root {
        color-scheme: dark;
        --bg-base: #191a1a;
        --bg-raised: #202222;
        --bg-subtle: #2a2c2c;
        --bg-quiet: #333636;
        --bg-offset: #242626;
        --border-subtlest: #2c2e2e;
        --border-subtle: #3a3d3d;
        --border-moderate: #4a4e4e;
        --text-foreground: #e8e8e6;
        --text-quiet: #9b9f9f;
        --text-quieter: #6f7373;
        --super: #32b8c6;
        --super-dim: rgba(50, 184, 198, 0.12);
        --inverse: #0d1414;
        --ok: #3dd68c;
        --warn: #e2b53e;
        --bad: #ef7a85;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.35);
        --shadow-overlay: 0 8px 30px rgba(0, 0, 0, 0.45);
        --duration-quick: 150ms;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg-base);
        color: var(--text-foreground);
        -webkit-font-smoothing: antialiased;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        height: 56px;
        padding: 0 1rem;
        background: var(--bg-base);
        border-bottom: 1px solid var(--border-subtlest);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        min-width: 0;
      }
      .brand .logo {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: var(--super);
        color: var(--inverse);
        font-weight: 700;
        font-size: 0.8rem;
        flex-shrink: 0;
      }
      .brand h1 {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
        white-space: nowrap;
      }
      .brand .meta {
        color: var(--text-quieter);
        font-size: 0.75rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
        gap: 1rem;
        padding: 1.25rem 1rem 3rem;
        max-width: 1080px;
        margin: 0 auto;
      }
      @media (max-width: 820px) {
        main { grid-template-columns: 1fr; }
      }

      h2 {
        margin: 0 0 0.75rem;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text-quiet);
        text-transform: none;
      }

      /* Composer: rounded-2xl raised card with focus ring, like the ask box. */
      .composer {
        background: var(--bg-raised);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        padding: 0.75rem;
        transition: border-color var(--duration-quick) ease-out;
      }
      .composer:focus-within { border-color: var(--border-moderate); }
      .composer textarea {
        display: block;
        width: 100%;
        min-height: 96px;
        resize: vertical;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text-foreground);
        caret-color: var(--super);
        font: inherit;
        padding: 0.25rem 0.25rem 0.5rem;
      }
      .composer textarea::placeholder { color: var(--text-quieter); }
      .composer textarea::selection { background: rgba(50, 184, 198, 0.35); }
      .composer .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        flex-wrap: wrap;
        padding-top: 0.5rem;
      }
      .composer .toolbar .left {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      /* Pill controls. */
      select, button, input[type="text"], input:not([type]) {
        font: inherit;
        color: var(--text-foreground);
      }
      .pill-select {
        appearance: none;
        height: 32px;
        padding: 0 1.9rem 0 0.85rem;
        border: 1px solid transparent;
        border-radius: 999px;
        background:
          url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%239b9f9f" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>')
            no-repeat right 0.75rem center,
          var(--bg-quiet);
        font-size: 0.85rem;
        cursor: pointer;
        transition: background-color var(--duration-quick) ease-out;
      }
      .pill-select:hover { background-color: var(--bg-subtle); }
      .pill-select:focus-visible { outline: 1px solid var(--super); }

      button {
        cursor: pointer;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        height: 32px;
        padding: 0 0.85rem;
        font-size: 0.85rem;
        font-weight: 550;
        white-space: nowrap;
        transition:
          background-color 300ms ease-out,
          border-color 300ms ease-out,
          color 300ms ease-out,
          transform 150ms ease-out,
          opacity 300ms ease-out;
        transform-origin: center;
      }
      button:active { transform: scale(0.97); }
      button:disabled { opacity: 0.5; cursor: default; transform: none; }
      button.primary {
        background: var(--super);
        color: var(--inverse);
        border-radius: 999px;
      }
      button.primary:hover { opacity: 0.85; }
      button.secondary {
        background: var(--bg-quiet);
        color: var(--text-foreground);
        border-radius: 999px;
      }
      button.secondary:hover { background: var(--bg-subtle); }
      button.ghost {
        background: transparent;
        color: var(--text-quiet);
        border-radius: 999px;
      }
      button.ghost:hover { color: var(--text-foreground); background: var(--bg-quiet); }
      button.danger {
        background: transparent;
        color: var(--bad);
        border: 1px solid var(--border-subtle);
        border-radius: 999px;
      }
      button.danger:hover { background: rgba(239, 122, 133, 0.1); border-color: var(--bad); }

      /* Run list: raised cards. */
      .runs {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.5rem;
      }
      .runs li {
        background: var(--bg-raised);
        border: 1px solid var(--border-subtlest);
        border-radius: var(--radius-md);
        padding: 0.7rem 0.8rem;
        cursor: pointer;
        transition:
          background-color var(--duration-quick) ease-out,
          border-color var(--duration-quick) ease-out;
      }
      .runs li:hover { background: var(--bg-offset); border-color: var(--border-subtle); }
      .runs li.active { border-color: var(--super); }
      .runs li.empty {
        cursor: default;
        color: var(--text-quieter);
        text-align: center;
        padding: 1.25rem;
        border-style: dashed;
        border-color: var(--border-subtle);
        background: transparent;
      }
      .runs .row-title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-width: 0;
      }
      .runs .agent { font-weight: 600; font-size: 0.85rem; }
      .runs .preview {
        color: var(--text-quiet);
        font-size: 0.8rem;
        margin-top: 0.3rem;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .runs .rid {
        color: var(--text-quieter);
        font-size: 0.7rem;
        margin-top: 0.3rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      /* Status pills. */
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.1rem 0.55rem;
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: var(--bg-quiet);
        color: var(--text-quiet);
      }
      .status::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
      }
      .status.in-progress, .status.created { color: var(--super); background: var(--super-dim); }
      .status.awaiting { color: var(--warn); background: rgba(226, 181, 62, 0.12); }
      .status.completed { color: var(--ok); background: rgba(61, 214, 140, 0.12); }
      .status.failed, .status.cancelled { color: var(--bad); background: rgba(239, 122, 133, 0.12); }

      /* Detail + approval cards. */
      .card {
        margin-top: 1rem;
        background: var(--bg-raised);
        border: 1px solid var(--border-subtlest);
        border-radius: var(--radius-md);
        padding: 0.9rem;
        box-shadow: var(--shadow-sm);
      }
      .card .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .card .card-head strong {
        font-size: 0.78rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--text-quiet);
        overflow-wrap: anywhere;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0.65rem 0 0;
        font-size: 0.8rem;
        line-height: 1.55;
        color: var(--text-quiet);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .card.approval {
        background: var(--bg-offset);
        border-color: rgba(226, 181, 62, 0.45);
      }
      .card.approval .title {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-weight: 600;
        color: var(--warn);
        font-size: 0.85rem;
      }
      .card.approval p {
        margin: 0.4rem 0 0.65rem;
        color: var(--text-quiet);
        font-size: 0.82rem;
      }
      .card.approval input {
        width: 100%;
        height: 36px;
        padding: 0 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-subtle);
        background: var(--bg-raised);
        caret-color: var(--super);
        outline: none;
        transition: border-color var(--duration-quick) ease-out;
      }
      .card.approval input:focus { border-color: var(--border-moderate); }
      .card.approval input::placeholder { color: var(--text-quieter); }
      .card.approval .actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.65rem;
        flex-wrap: wrap;
      }

      .error {
        margin-top: 0.65rem;
        padding: 0.55rem 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(239, 122, 133, 0.4);
        background: rgba(239, 122, 133, 0.08);
        color: var(--bad);
        font-size: 0.82rem;
      }

      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: var(--bg-quiet); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-moderate); }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo">A</div>
        <h1>Altius Fleet</h1>
      </div>
      <div class="brand"><span class="meta">localhost thin client · no auth</span></div>
    </header>
    <main>
      <section>
        <h2>Dispatch</h2>
        <div class="composer">
          <textarea id="prompt" placeholder="@Browser open https://example.com and summarize the title…"></textarea>
          <div class="toolbar">
            <div class="left">
              <select id="agent" class="pill-select" aria-label="Agent">
                <option value="browser">Browser</option>
                <option value="altius">Supervisor</option>
              </select>
              <button id="refresh" class="ghost" type="button">Refresh</button>
            </div>
            <button id="send" class="primary" type="button">Send run</button>
          </div>
        </div>
        <div id="error" class="error" hidden></div>

        <div id="detail" class="card" hidden>
          <div class="card-head">
            <strong id="detail-id"></strong>
            <span id="detail-status" class="status"></span>
          </div>
          <pre id="detail-body"></pre>
          <div id="approval" class="card approval" hidden>
            <div class="title">Approval required</div>
            <p>This run is <code>awaiting</code>. Approve to resume, or cancel it.</p>
            <input id="approval-msg" placeholder="Optional resume message…" />
            <div class="actions">
              <button id="approve" class="primary" type="button">Approve &amp; resume</button>
              <button id="cancel" class="danger" type="button">Cancel run</button>
            </div>
          </div>
        </div>
      </section>

      <section>
        <h2>Runs</h2>
        <ul id="runs" class="runs"></ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
